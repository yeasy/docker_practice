version: "3"

services:

  mdpress-build:
    &mdpress-build
    image: yeasy/docker_practice:latest
    volumes:
      - ./:/srv/gitbook-src
    command: build

  mdpress-server:
    << : *mdpress-build
    ports:
      - 4000:4000
    command: server

  # docker run -it --rm -p 4000:80 dockerpracticesig/docker_practice
  mdpress-offline:
    &mdpress-offline
    # this image build by GitHub Action
    image: dockerpracticesig/docker_practice:mdpress
    ports:
      - 4000:80

  vuepress-offline:
    << : *mdpress-offline
    image: dockerpracticesig/docker_practice:vuepress

  # developer test docker image

  development:
    build: ./.travis
    image: yeasy/docker_practice:latest
    ports:
      - 4000:4000
    volumes:
      - ./:/srv/gitbook-src
    command: server
    # command: build
